name: Build and Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE and ZIP
        run: python build_dist.py

      - name: Resolve release asset
        id: asset
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path dist -Filter *.zip -File
          if (-not $zips -or $zips.Count -eq 0) {
            Write-Error "No zip artifact found in dist/ after build."
            exit 1
          }
          if ($zips.Count -gt 1) {
            Write-Error "Multiple zip artifacts found in dist/: $($zips.Name -join ', ')"
            exit 1
          }
          "zip_path=$($zips[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.zip_path }}
